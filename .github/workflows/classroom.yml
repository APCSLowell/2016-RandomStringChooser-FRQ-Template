name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: parta1
      id: parta1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: parta1
        setup-command: ''
        command: gradle test --tests "SoundTest.partA1"
        timeout: 10
        max-score: 1
    - name: parta
      id: parta
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: parta
        setup-command: ''
        command: gradle test --tests "SoundTest.partB"
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        PARTA_RESULTS: "${{steps.parta.outputs.result}}"
        PARTB_RESULTS: "${{steps.partb.outputs.result}}"
      with:
        runners: parta1,parta2,parta3,parta4,partb1,partb2